ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.3
    two_d_mode: true

    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.1

    # State vector order:
    
    # [위치 x, 위치 y, 위치 z,
    #  자세 roll, 자세 pitch, 자세 yaw,
    #  선속도 vx, 선속도 vy, 선속도 vz,
    #  각속도 vroll, 각속도 vpitch, 각속도 vyaw,
    #  선가속도 ax, 선가속도 ay, 선가속도 az]

    # 1) Wheel odom: 속도 정보만 사용
    odom0: /wheel/odom
    odom0_config:
      [false, false, false,
       false, false, false,
       true,  false, false,
       false, false, true,
       false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_twist_rejection_threshold: 5.0

    # 2) Camera odom은 일단 EKF에서 제외
    # odom1: /camera/odom

    # 3) IMU는 z축 각속도만 사용
    imu0: /imu
    imu0_config:
      [false, false, false,
       false, false, false,
       false, false, false,
       false, false, true,
       false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_twist_rejection_threshold: 1.0
    imu0_remove_gravitational_acceleration: false
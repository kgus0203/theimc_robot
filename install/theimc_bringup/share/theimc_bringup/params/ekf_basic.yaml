ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.3
    two_d_mode: true

    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.1

    # Basic mode: use wheel odometry as the complete 2D odom source.
    odom0: /wheel/odom
    odom0_config:
      [true,  true,  false,
       false, false, true,
       true,  true,  false,
       false, false, true,
       false, false, false]

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_twist_rejection_threshold: 5.0

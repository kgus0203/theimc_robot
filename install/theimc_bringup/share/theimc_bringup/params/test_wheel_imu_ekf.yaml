ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.5
    two_d_mode: true

    publish_tf: false
    publish_acceleration: false
    print_diagnostics: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.2

    # State vector order:
    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az

    # Test 3: wheel encoder odometry + IMU.
    odom0: /wheel/odom
    odom0_config:
      [true,  true,  false,
       false, false, true,
       true,  true,  false,
       false, false, true,
       false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_twist_rejection_threshold: 5.0

    imu0: /imu
    imu0_config:
      [false, false, false,
       false, false, true,
       false, false, false,
       false, false, true,
       true,  true,  false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 20
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.0
    imu0_linear_acceleration_rejection_threshold: 2.0
    imu0_remove_gravitational_acceleration: true

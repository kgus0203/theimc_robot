twist_mux:
  ros__parameters:
    topics:
      # 1. Nav2 자율주행 (기본 우선순위)
      navigation:
        topic: nav_vel
        timeout: 0.5
        priority: 10
        
      # 2. ArUco 도킹 (Nav2보다 높은 우선순위)
      docking:
        topic: dock_vel
        timeout: 0.5
        priority: 20
        
      # 3. 조이스틱/수동 제어 (가장 높은 우선순위 - 위급 시 개입용)
      joystick:
        topic: joy_vel
        timeout: 0.5
        priority: 100
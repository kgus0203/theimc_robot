twist_mux:
  ros__parameters:
    use_stamped: false

    topics:
      navigation:
        topic: /cmd_vel_nav
        timeout: 0.5
        priority: 20

      rail:
        topic: /cmd_vel_rail
        timeout: 0.5
        priority: 30

      web_jog:
        topic: /cmd_vel_web
        timeout: 0.5
        priority: 90

      teleop:
        topic: /cmd_vel_teleop
        timeout: 0.5
        priority: 100

    locks:
      emergency_stop:
        topic: /emergency_stop
        timeout: 0.0
        priority: 255
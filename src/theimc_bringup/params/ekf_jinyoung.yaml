ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.3
    two_d_mode: true

    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.1

    # State vector order:
    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az

    # STM32 wheel odometry.
    # Baseline odometry source: publish x/y/yaw even when camera and IMU are
    # absent. Camera odometry and IMU correct this estimate when available.
    odom0: /wheel/odom
    odom0_config:
      [false, false, false,
       false, false, false,
       true,  true,  false,
       false, false, true,
       false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_twist_rejection_threshold: 5.0

    # D435 RGB-D odometry.
    # Fuse planar position and yaw. The topic may be absent when
    # enable_d435i_fusion=false.
    odom1: /camera/odom
    odom1_config:
      [false, false, false,
       false, false, false,
       true, false, false,
       false, false, true,
       false, false, false]
    odom1_differential: false
    odom1_relative: true
    odom1_queue_size: 10
    odom1_pose_rejection_threshold: 2.0

    # STM32 IMU.
    # Fuse usable 2D states from the IMU message. robot_localization uses the
    # covariance in /imu for each enabled field; fields published with
    # covariance[0] = -1 are ignored until the STM32 sends valid data.
    imu0: /imu
    imu0_config:
      [false, false, false,
       false, false, false,
       false, false, false,
       false, false, true,
       true,  true,  false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 20
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.0
    imu0_linear_acceleration_rejection_threshold: 2.0
    imu0_remove_gravitational_acceleration: true

controller_server:
  ros__parameters:
    cmd_vel_topic: /cmd_vel_nav
    use_sim_time: False

    # Humble MPPI에서는 controller 주기와 model_dt를 동일하게 맞춘다.
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["precise_goal_checker"]
    current_goal_checker: "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    precise_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 1.57
      stateful: True

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.03
      movement_time_allowance: 20.0

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      time_steps: 50
      model_dt: 0.10
      batch_size: 1000
      iteration_count: 1

      # 전후진 허용
      vx_max: 0.25
      vx_min: -0.12
      vy_max: 0.0
      wz_max: 0.40

      # 후진 후보도 충분히 생성
      vx_std: 0.15
      vy_std: 0.0
      wz_std: 0.20

      temperature: 0.30
      gamma: 0.015

      motion_model: "DiffDrive"
      visualize: false
      regenerate_noises: false
      retry_attempt_limit: 2
      reset_period: 1.0

      prune_distance: 1.2
      transform_tolerance: 0.2

      # 경로가 직접 후진을 지시하지 않더라도
      # MPPI가 필요한 경우 방향을 바꿀 수 있도록 함
      enforce_path_inversion: false

      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.5
        critical_cost: 300.0
        collision_cost: 1000000.0
        consider_footprint: true
        inflation_layer_name: "inflation_layer"
        near_goal_distance: 0.5

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.8

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 8
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0
        offset_from_furthest: 4
        threshold_to_consider: 1.0

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.5
        offset_from_furthest: 3
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2

        # 후진을 정상 후보로 인정
        forward_preference: false

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.06
      transform_tolerance: 0.5
      footprint: "[[0.40, 0.55], [0.40, -0.55], [-0.40, -0.55], [-0.40, 0.55]]"
      footprint_padding: 0.1

      plugins: ["obstacle_layer", "inflation_layer"]

      filters: ["keepout_filter"]
      keepout_filter:
       plugin: "nav2_costmap_2d::KeepoutFilter"
       enabled: True
       filter_info_topic: "/costmap_filter_info"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.55

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.15
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        publish_voxel_map: true
        voxel_size: 0.05
        voxel_decay: 1.0
        observation_sources: pointcloud
        pointcloud:
          data_type: PointCloud2
          topic: /points
          reliability: 2
          marking: true
          clearing: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      footprint: "[[0.40, 0.55], [0.40, -0.55], [-0.40, -0.55], [-0.40, 0.55]]"
      footprint_padding: 0.1
      transform_tolerance: 0.5
      resolution: 0.06
      track_unknown_space: true

      # static_layer가 정의되어 있었는데 plugins에 빠져 있어서 추가
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      filters: ["keepout_filter"]
      keepout_filter:
       plugin: "nav2_costmap_2d::KeepoutFilter"
       enabled: True
       filter_info_topic: "/costmap_filter_info"

# filter_info_topic: "/costmap_filter_info"
# type: 0
# mask_topic: "/keepout_filter_mask"

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.15
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 0.55

      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

behavior_server:
  ros__parameters:
    cmd_vel_topic: cmd_vel_behavior
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0

    behavior_plugins: ["backup", "wait"]

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 1.0
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.1
    min_rotational_vel: 0.05

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 2000
    stop_on_failure: true
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


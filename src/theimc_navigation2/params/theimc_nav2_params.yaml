controller_server:
  ros__parameters:
    cmd_vel_topic: /cmd_vel # 이렇게 들어가고 mux에서 cmd_vel이 나감 
    use_sim_time: False
    controller_frequency: 10.0

    # 너무 작은 cmd_vel을 0으로 잘라먹지 않도록 낮춤
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    # goal 중간 실패를 조금 덜 민감하게
    failure_tolerance: 0.5

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["precise_goal_checker"]
    current_goal_checker: "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    precise_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25 # 1.57 # 90도
      stateful: True

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.03
      movement_time_allowance: 20.0

    PathHandler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 1.0
      enforce_path_inversion: False
      enforce_path_rotation: False
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      minimum_rotation_angle: 0.25
      reject_unit_path: False

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.18

      lookahead_dist: 0.55
      min_lookahead_dist: 0.45
      max_lookahead_dist: 0.70
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false

      # 도착지점 빙글빙글 방지
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.2 # 제자리 회전을 발동시키는 각도 기준 (0.35는 약 20도) 오차가 이 값보다 크면 일단 제자리에서 방향부터 맞추게 됨
      rotate_to_heading_angular_vel: 0.3 # 제자리 회전할 때 얼마나 빠르게 돌지

      max_angular_accel: 1.0
      max_angular_decel: 1.0

      allow_reversing: false

      use_cost_regulated_linear_velocity_scaling: false
      use_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 1.2
      regulated_linear_scaling_min_speed: 0.05
      min_approach_linear_velocity: 0.08

      use_collision_detection: false

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.06
      transform_tolerance: 0.5
      # footprint: "[[-0.35, -0.35], [-0.35, 0.35], [0.35, 0.35], [0.35, -0.35]]"
      # footprint_padding: 0.1
      robot_radius: 0.5 # 판떼기가 90에 바퀴가 나와있어서 좀 크게

      plugins: ["obstacle_layer", "inflation_layer"]

      filters: ["keepout_filter"]
      keepout_filter:
       plugin: "nav2_costmap_2d::KeepoutFilter"
       enabled: True
       filter_info_topic: "/costmap_filter_info"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.55

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.15
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        publish_voxel_map: true
        voxel_size: 0.05
        voxel_decay: 1.0
        observation_sources: pointcloud
        pointcloud:
          data_type: PointCloud2
          topic: /points
          reliability: 2
          marking: true
          clearing: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      # footprint: "[[-0.35, -0.35], [-0.35, 0.35], [0.35, 0.35], [0.35, -0.35]]"
      # footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"
      robot_radius: 0.5 # 판떼기가 90에 바퀴가 나와있어서 좀 크게
      # footprint_padding: 0.1
      transform_tolerance: 0.5
      resolution: 0.06
      track_unknown_space: true

      plugins:
        ["static_layer", "obstacle_layer", "inflation_layer"]

      filters:
        ["keepout_filter", "keepout_inflation_layer"]

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"

      # Keepout Filter가 적용된 후 실행
      keepout_inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

      # 기존 실제 장애물용 Inflation
      # inflation_layer:
      #   plugin: "nav2_costmap_2d::InflationLayer"
      #   enabled: true
      #   inflation_radius: 0.75
      #   cost_scaling_factor: 3.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.15
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true
      
planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

behavior_server:
  ros__parameters:
    cmd_vel_topic: cmd_vel_behavior
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0

    behavior_plugins: ["backup", "wait"]

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 1.0
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.3
    min_rotational_vel: 0.1

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 2000
    stop_on_failure: true
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200
